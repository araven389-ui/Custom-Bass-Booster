<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0d0d;
            --panel-bg: #1a1a1a;
        }
        body {
            width: 280px;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Consolas', monospace;
            margin: 0;
            padding: 15px;
            border: 2px solid var(--neon-green);
            transition: all 0.2s ease;
        }
        h2 {
            text-align: center;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin: 0 0 15px 0;
        }
        .container {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: var(--neon-green);
            font-size: 12px;
            margin-bottom: 8px;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 6px;
            background: #222;
            border: 1px solid var(--neon-green);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            background: var(--neon-green);
            border-radius: 2px;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 0 10px var(--neon-green);
        }
        .warning {
            font-size: 9px;
            color: #ff5555;
            text-align: center;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h2>NEON BASS 100</h2>
    <div class="container">
        <div class="slider-label">
            <span>BASS BOOST</span>
            <span id="val-display">0dB</span>
        </div>
        <input type="range" id="bassSlider" min="0" max="50"
    </div>
    <p class="warning">Caution: High Volume Distortion Active</p>
    <script src="popup.js"></script>
</body>
</html>
